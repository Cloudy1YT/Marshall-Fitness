<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title> Membership Registration - Marshall Fitness </title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Wallpoet&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
              <div class="logo">
                <img src="images/fitness-logo.jpg" alt="marshall fitness logo" class="logo-pic">
            <h1>Marshall Fitness</h1>
            </div>
            <nav>
                <ul> 
                    <li><a href="index.html">About Us</a></li>
                    <li><a href="registration.html" class="active"> Join Marshall Fitness Today</a></li>
                    <li><a href="schedule.html"> Gym Schedule </a></li>
                </ul>
            </nav>
        </header>

        <main>
        <form id="membership-form">
            <h2>Membership Registration</h2>
            <div class="form-group">
                <label for="first-name">First Name:</label>
                <input type="text" id="first-name" name="first-name" required>
            </div>
            <div class="form-group">
             <label for="last-name">Last Name:</label>
            <input type="text" id="last-name" name="last-name" required>
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
            </div>
            <div class="form-group">
                <label>Membership Type:</label>
               <select id="membership-type" name="membership-type" required>
                <option value=""> Choose from one of our various pricing plans: </option>
                <option value="basic">Basic</option>
                <option value="vip">VIP</option>
                <option value="top-class"> Top Class</option>
               </select>
            </div>
             <div class="form-group">
                <label for="phone">Phone Number:</label>
                <input type="tel" id="phone" name="phone" required>
            </div>
              <div class="form-group">
             <label for="fitness-goals">What are your fitness goals?:</label>
            <textarea id="fitness-goals" name="fitness-goals" rows="2" required></textarea>
            </div>
              <div class="form-group">
             <label for="fitness-history">What's your fitness history, have you been to a gym before?:</label>
            <textarea id="fitness-history" name="fitness-history" rows="2" required></textarea>
            </div>
             <div class="form-group">
         <label>How did you hear about us?</label>
            <label><input type="checkbox" name="source" value="TikTok"> TikTok</label>
            <label><input type="checkbox" name="source" value="Instagram"> Instagram</label>
            <label><input type="checkbox" name="source" value="Facebook"> Facebook </label>

            <div id="error"></div>
            <button type="submit">Register</button>


</div>
        </form>

    </main>

    <footer> 
        <p>&copy; 2026 Marshall Fitness. All rights reserved. </p>
    </footer>

    <script src="java.js"></script>
    </body>
    
</html>
